---
layout: default
products: ['/pgb-1/', '/amvs/', '/noise-nugget-2040/']
---
<style>
.product-box {
  height: auto;
  padding: 1em;
  margin: 2rem;
  box-sizing: border-box;
  display: grid;
  grid-template-columns: 2fr 1fr;

 
  }
  .product-box > div {
    align-self: center;
    justify-self: center;
  }
</style>
  
{% for product in page.products %}
{% assign subpage = site.pages | where: 'url', product %}
<a href="{{ subpage[0].url }}" class="grey-box product-box" style="height:12rem;" >
    <div style="vertical-align: middle; font-family: zeroesone; width:
                  60%;text-align: center;">
     <h2>{{ subpage[0].product-name }}</h2>
     {{ subpage[0].product-tagline }}
   </div>
   <div>
     <img style="max-height:9rem;" src="{{ subpage[0].product-background }}">
   </div>
</a>

{% endfor %}
